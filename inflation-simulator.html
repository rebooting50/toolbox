<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리부팅50 — 화폐가치 녹아내림(인플레) 계산기</title>
    <script src="k-sdk.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #0f172a; /* 시각적 충격을 위해 다크 모드 톤 채택 */
            color: #f8fafc;
            line-height: 1.6;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* 헤더 */
        .channel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #1e293b;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .channel-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        .channel-logo-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #f97316;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 700;
            font-size: 15px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .channel-name::after {
            content: 'HOT';
            font-size: 9px;
            background: #f97316;
            color: white;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: bold;
        }

        .channel-sub {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 1px;
        }

        /* 메인 카드 */
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            margin-bottom: 16px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #f8fafc;
            letter-spacing: -0.5px;
        }

        .card .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        /* 입력 그룹 */
        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 14.5px;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 14px;
            border: 2px solid #334155;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            background: #0f172a;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .input-row input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2);
        }

        .input-row .unit {
            font-size: 16px;
            font-weight: 700;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* 계산 버튼 */
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.3);
        }

        .calc-btn:hover {
            background: #ea580c;
            transform: translateY(-1px);
        }

        /* 결과 영역 */
        .result-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 16px;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .result-main {
            font-size: 26px;
            font-weight: 900;
            color: #ef4444; /* 경고 레드 */
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .result-grid {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item .label {
            font-size: 14px;
            color: #94a3b8;
        }

        .result-item .val {
            font-size: 15px;
            font-weight: 700;
            color: #f8fafc;
        }

        .result-item .val.highlight {
            color: #f97316;
        }

        /* 공유 액션 버튼 그룹 스타일 통합 */
        .share-actions-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .share-btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: #334155;
            color: #cbd5e1;
        }

        .share-btn:hover {
            background: #475569;
            color: #f8fafc;
        }

        .share-btn.kakao {
            background: #fee500;
            color: #191919;
        }
        .share-btn.kakao:hover {
            background: #fada0a;
        }

        .share-btn.image-save {
            background: #2e1065;
            color: #d8b4fe;
            border: 1px solid #4c1d95;
        }
        .share-btn.image-save:hover {
            background: #3b0764;
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 12px;
            color: #64748b;
        }
        .footer a {
            color: #94a3b8;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="channel-header">
            <img src="https://yt3.ggpht.com/h_FARWUFahuMblQIBr6cldobBEjO5TGh3--M34WuMc51dwxY63OVOaOAseOtv8GqCcbSVtYkjg=s176-c-k-c0x00ffffff-no-rj" class="channel-logo-img" alt="리부팅50">
            <div class="channel-info">
                <div class="channel-name">리부팅50 자산방어 연구소</div>
                <div class="channel-sub">가만히 둔 내 현금의 실시간 자산 파괴력 측정기</div>
            </div>
        </div>

        <div class="card">
            <h1>화폐가치 녹아내림 계산기</h1>
            <p class="subtitle">인플레이션 지옥 속에서 내 통장의 진짜 구매력을 계산합니다.</p>

            <div class="input-group">
                <label>💵 현재 그냥 묶여있는 현금자산</label>
                <div class="input-row">
                    <input type="number" id="amount" value="5000" step="500">
                    <span class="unit">만 원</span>
                </div>
            </div>

            <div class="input-group">
                <label>⏳ 그대로 방치할 기간</label>
                <div class="input-row">
                    <input type="number" id="years" value="10">
                    <span class="unit">년 동안</span>
                </div>
            </div>

            <div class="input-group">
                <label>🔥 예상 연간 물가상승률(인플레)</label>
                <div class="input-row">
                    <input type="number" id="inflationRate" value="3.5" step="0.1">
                    <span class="unit">%</span>
                </div>
            </div>

            <button class="calc-btn" onclick="calculateInflation()">🚨 내 돈의 미래 가치 확인하기</button>
        </div>

        <div class="result-card" id="resultCard">
            <div id="captureArea" style="background: #1e293b; padding: 10px; border-radius: 16px;">
                <div class="result-title">화폐 가치 침식 진단</div>
                <div class="result-main" id="resultComment">내 돈은 실시간으로 녹아내리는 중!</div>

                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">현재 원금의 숫자</span>
                        <span class="val" id="nominalDisplay">—</span>
                    </div>
                    <div class="result-item">
                        <span class="label">미래의 실제 구매력 가치</span>
                        <span class="val highlight" id="futureValueDisplay">—</span>
                    </div>
                    <div class="result-item">
                        <span class="label">눈 씻고 봐도 사라진 내 돈</span>
                        <span class="val" id="lostValueDisplay" style="color: #ef4444;">—</span>
                    </div>
                </div>
            </div>

            <div class="share-actions-group">
                <button class="share-btn kakao" onclick="shareKakao()">💛 카카오톡으로 결과 공유하기</button>
                <div class="action-row">
                    <button class="share-btn" onclick="copyInflationResult()">📋 텍스트 복사</button>
                    <button class="share-btn image-save" onclick="saveAsImage()">📸 이미지로 저장</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://www.youtube.com/@%EB%A6%AC%EB%B6%80%ED%8C%8550" target="_blank">© 리부팅50 자산배분 인텔리전스</a>
        </div>
    </div>

    <script>
        // 카카오 SDK 초기화 처리
        try {
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                Kakao.init('6ebaddaec876611ecd045b336acfdc66'); 
                console.log("카카오 SDK 초기화 성공:", Kakao.isInitialized());
            }
        } catch(e) {
            console.error("카카오 초기화 예외 로그:", e);
        }

        function calculateInflation() {
            const amountMan = parseFloat(document.getElementById('amount').value) || 0;
            const years = parseInt(document.getElementById('years').value) || 0;
            const rate = parseFloat(document.getElementById('inflationRate').value) || 0;

            if (amountMan <= 0 || years <= 0 || rate <= 0) {
                alert("모든 필드에 정확한 값을 입력해주세요!");
                return;
            }

            const nominalAmount = amountMan * 10000;
            // 복리 공식 기반 미래 구매력 가치 하락 계산: 원금 / (1 + r)^n
            const futureValue = nominalAmount / Math.pow((1 + (rate / 100)), years);
            const lostValue = nominalAmount - futureValue;

            document.getElementById('nominalDisplay').textContent = formatMoney(nominalAmount);
            document.getElementById('futureValueDisplay').textContent = formatMoney(futureValue);
            document.getElementById('lostValueDisplay').textContent = formatMoney(lostValue);

            // 침식 비율에 따른 따끔한 한마디 매칭
            const lostRatio = (lostValue / nominalAmount) * 100;
            let comment = "";
            if (lostRatio >= 40) {
                comment = `😱 통장이 반토막 났습니다! 구매력의 ${(lostRatio).toFixed(0)}%가 공중분해 되었습니다.`;
            } else if (lostRatio >= 25) {
                comment = `🚨 위험 수준! 가만히 둔 죄로 약 ${formatMoney(lostValue)}가 녹아 없어졌습니다.`;
            } else {
                comment = `📉 보이지 않는 도둑 물가상승률에게 내 돈을 실시간으로 뜯기는 중입니다!`;
            }
            document.getElementById('resultComment').textContent = comment;

            const card = document.getElementById('resultCard');
            card.classList.add('show');
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function formatMoney(amount) {
            if (amount >= 100000000) {
                const eok = Math.floor(amount / 100000000);
                const man = Math.round((amount % 100000000) / 10000);
                return man > 0 ? `${eok}억 ${man}만 원` : `${eok}억 원`;
            } else {
                return `${Math.round(amount / 10000).toLocaleString()}만 원`;
            }
        }

        // 1. 텍스트 복사 방식
        function copyInflationResult() {
            const current = document.getElementById('nominalDisplay').textContent;
            const future = document.getElementById('futureValueDisplay').textContent;
            const lost = document.getElementById('lostValueDisplay').textContent;
            const years = document.getElementById('years').value;
            const rate = document.getElementById('inflationRate').value;
            const currentUrl = window.location.href;

            const text = `🚨 [리부팅50] 화폐가치 녹아내림 경보!\n\n현재 내 돈 ${current}을\n연 물가상승률 ${rate}% 지옥에 ${years}년 동안 방치하면?\n\n- 미래 실제 가치: ${future}\n- 증발해버린 구매력: ${lost}\n\n나도 내 통장 녹아내림 측정해보기 👇\n🔗 ${currentUrl}\n\n* 통장의 숫자에 속지 마세요. 가만히 두면 내 돈은 실시간으로 녹아내립니다!`;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('충격적인 인플레 결과와 툴박스 링크가 📋 클립보드에 복사되었습니다.');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('충격적인 인플레 결과와 툴박스 링크가 📋 클립보드에 복사되었습니다.');
            }
        }

        // 2. 카카오톡 공유 피드 규격 연동
        function shareKakao() {
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                try {
                    Kakao.init('6ebaddaec876611ecd045b336acfdc66');
                } catch (e) {
                    console.error("클릭 시점 재초기화 예외:", e);
                }
            }

            if (typeof Kakao === 'undefined') {
                alert("카카오 서버와 통신할 수 없습니다. 일반 '텍스트 복사'를 이용해주세요!");
                return;
            }
            
            if (!Kakao.isInitialized()) {
                alert("카카오 스크립트 키 인증에 실패했습니다.");
                return;
            }

            const years = document.getElementById('years').value;
            const rate = document.getElementById('inflationRate').value;
            
            const baseDomain = "https://rebooting50.github.io/toolbox/inflation-simulator.html"; 
            const safeImg = "https://ssl.gstatic.com/onebox/financial/charts/common/trending_up_green_24dp.png";

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '🚨 리부팅50 화폐가치 녹아내림 경보',
                    description: `연 물가상승률 ${rate}% 지옥에 ${years}년 방치할 때 내 현금의 운명은?`,
                    imageUrl: safeImg,
                    link: {
                        mobileWebUrl: baseDomain,
                        webUrl: baseDomain,
                    },
                },
                buttons: [
                    {
                        title: '내 돈 지키러 가기',
                        link: {
                            mobileWebUrl: baseDomain,
                            webUrl: baseDomain,
                        },
                    },
                ],
            });
        }

        // 3. html2canvas 기반 이미지 스크린샷 저장
        function saveAsImage() {
            const captureArea = document.getElementById('captureArea');
            
            html2canvas(captureArea, {
                backgroundColor: "#1e293b",
                scale: 2, 
                logging: false,
                useCORS: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = image;
                link.download = '리부팅50_화폐가치_녹아내림_결과.png';
                link.click();
            }).catch(err => {
                console.error("이미지 저장 실패:", err);
                alert("이미지 변환 중 오류가 발생했습니다. 브라우저 보안 설정을 확인해주세요.");
            });
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateInflation();
            });
        });
    </script>
</body>
</html>
