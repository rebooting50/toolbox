<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리부팅50 — 전격 재테크 나이 판독기</title>
    <script src="k-sdk.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #f0fdf4; /* 상큼한 그린톤 배경 */
            color: #1f2937;
            line-height: 1.6;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* 헤더 — 채널 로고 */
        .channel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .channel-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .channel-logo-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #16a34a;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 700;
            font-size: 15px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .channel-name::after {
            content: 'AGE';
            font-size: 9px;
            background: #16a34a;
            color: white;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: bold;
        }

        .channel-sub {
            font-size: 13px;
            color: #4b5563;
            margin-top: 1px;
        }

        /* 메인 카드 */
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .card .subtitle {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 24px;
        }

        /* 입력 그룹 */
        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 14.5px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            background: #f9fafb;
            color: #111827;
            outline: none;
            transition: all 0.2s;
        }

        .input-row input:focus {
            border-color: #16a34a;
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
        }

        .input-row .unit {
            font-size: 16px;
            font-weight: 700;
            color: #4b5563;
            white-space: nowrap;
        }

        /* 판독 버튼 */
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.3);
        }

        .calc-btn:hover {
            background: #15803d;
            transform: translateY(-1px);
        }

        /* 결과 영역 */
        .result-card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 14px;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .result-main {
            font-size: 28px;
            font-weight: 900;
            color: #16a34a;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .result-grid {
            background: #f9fafb;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #f3f4f6;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item .label {
            font-size: 14px;
            color: #4b5563;
        }

        .result-item .val {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
        }

        .result-comment-box {
            font-size: 14px;
            color: #374151;
            background: #f0fdf4;
            padding: 14px;
            border-radius: 12px;
            border-left: 4px solid #16a34a;
            line-height: 1.5;
        }

        /* 공유 액션 버튼 그룹 스타일 */
        .share-actions-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .share-btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: #f3f4f6;
            color: #4b5563;
        }

        .share-btn:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .share-btn.kakao {
            background: #fee500;
            color: #191919;
        }
        .share-btn.kakao:hover {
            background: #fada0a;
        }

        .share-btn.image-save {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .share-btn.image-save:hover {
            background: #dcfce7;
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 12px;
            color: #9ca3af;
        }
        .footer a {
            color: #6b7280;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://www.youtube.com/@%EB%A6%AC%EB%B6%80%ED%8C%8550" target="_blank" class="channel-header">
            <img src="https://yt3.ggpht.com/h_FARWUFahuMblQIBr6cldobBEjO5TGh3--M34WuMc51dwxY63OVOaOAseOtv8GqCcbSVtYkjg=s176-c-k-c0x00ffffff-no-rj" class="channel-logo-img" alt="리부팅50">
            <div class="channel-info">
                <div class="channel-name">리부팅50 금융 나이 연구소</div>
                <div class="channel-sub">순자산과 소비 습관으로 분석하는 재테크 나이 측정기</div>
            </div>
        </a>

        <div class="card">
            <h1>전격 재테크 나이 판독기</h1>
            <p class="subtitle">실제 나이와 자산 형성 속도를 비교하여 나의 금융 정신연령을 판독합니다.</p>

            <div class="input-group">
                <label>🎂 현재 실제 나이 (만 기준)</label>
                <div class="input-row">
                    <input type="number" id="realAge" value="50" min="20" max="100">
                    <span class="unit">세</span>
                </div>
            </div>

            <div class="input-group">
                <label>💰 보유 순자산 (총자산 - 대출/부채)</label>
                <div class="input-row">
                    <input type="number" id="netAsset" value="54000" step="1000">
                    <span class="unit">만 원</span>
                </div>
            </div>

            <button class="calc-btn" onclick="calculateFinancialAge()">🕵️‍♂️ 나의 금융 정신연령 판독하기</button>
        </div>

        <div class="result-card" id="resultCard">
            <div id="captureArea" style="background: white; padding: 10px; border-radius: 16px;">
                <div class="result-title">금융 멘탈 진단 리포트</div>
                <div class="result-main" id="financialAgeDisplay">판독 중...</div>

                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">실제 입력 나이</span>
                        <span class="val" id="realAgeDisplay">— 세</span>
                    </div>
                    <div class="result-item">
                        <span class="label">금융 자산 연령</span>
                        <span class="val" id="calculatedAgeDisplay">— 세</span>
                    </div>
                </div>

                <div class="result-comment-box" id="ageComparison">
                    결과 요약 내용이 여기에 출력됩니다.
                </div>
            </div>

            <div class="share-actions-group">
                <button class="share-btn kakao" onclick="shareKakao()">💛 카카오톡으로 결과 공유하기</button>
                <div class="action-row">
                    <button class="share-btn" onclick="copyFinancialAge()">📋 텍스트 복사</button>
                    <button class="share-btn image-save" onclick="saveAsImage()">📸 이미지로 저장</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://www.youtube.com/@%EB%A6%AC%EB%B6%80%ED%8C%8550" target="_blank">© 리부팅50 자산배분 인텔리전스</a>
        </div>
    </div>

    <script>
        // 카카오 SDK 초기화 처리
        try {
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                Kakao.init('6ebaddaec876611ecd045b336acfdc66'); 
                console.log("카카오 SDK 초기화 성공:", Kakao.isInitialized());
            }
        } catch(e) {
            console.error("카카오 초기화 예외 로그:", e);
        }

        function calculateFinancialAge() {
            const realAge = parseInt(document.getElementById('realAge').value) || 0;
            const netAssetMan = parseFloat(document.getElementById('netAsset').value) || 0;

            if (realAge <= 0 || netAssetMan <= 0) {
                alert("정확한 나이와 자산을 입력해주세요!");
                return;
            }

            // 대한민국 중위 자산 통계 기반 가상 금융 연령 커브 공식
            let financialAge = 30;
            if (netAssetMan >= 100000) { financialAge = 65; }
            else if (netAssetMan >= 70000) { financialAge = 55; }
            else if (netAssetMan >= 50000) { financialAge = 48; }
            else if (netAssetMan >= 30000) { financialAge = 40; }
            else if (netAssetMan >= 15000) { financialAge = 34; }
            else { financialAge = 25; }

            document.getElementById('realAgeDisplay').textContent = `${realAge}세`;
            document.getElementById('calculatedAgeDisplay').textContent = `${financialAge}세`;

            const diff = realAge - financialAge;
            let title = "";
            let comment = "";

            if (diff > 10) {
                title = `👶 금융 연령 [${financialAge}세] 초년생 레벨`;
                comment = `실제 나이(${realAge}세)에 비해 자산 체력이 다소 청춘(?)이십니다. 보이지 않는 도둑인 인플레이션을 방어하고, 지금부터 자산 배분 인공호흡 시스템을 가동해 금융 연령을 빠르게 빌드업해야 합니다!`;
            } else if (diff >= -5 && diff <= 10) {
                title = `🤝 금융 연령 [${financialAge}세] 평온한 노멀형`;
                comment = `현재 나이 흐름과 자산 균형 속도가 정석대로 무난하게 잘 순항하고 계십니다. 다만 자산이 예·적금에만 과하게 쏠려있다면 고령화 속도에 밀릴 수 있으니 매월 연금식 포트폴리오 다각화를 추천합니다.`;
            } else {
                title = `🧓 금융 연령 [${financialAge}세] 노련한 자산 대감형`;
                comment = `축하합니다! 실제 나이보다 훨씬 앞서 나가는 탄탄한 금융 방어벽을 구축하셨습니다. 노후 파이프라인의 완성도가 매우 높으므로 월 배당 흐름을 단단히 세팅하여 조기 은퇴(FIRE)를 설계하셔도 충분한 상위 클래스입니다.`;
            }

            document.getElementById('financialAgeDisplay').textContent = title;
            document.getElementById('ageComparison').textContent = comment;

            const card = document.getElementById('resultCard');
            card.classList.add('show');
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 1. 텍스트 복사 방식
        function copyFinancialAge() {
            const ageTitle = document.getElementById('financialAgeDisplay').textContent;
            const comp = document.getElementById('ageComparison').textContent;
            const realAge = document.getElementById('realAgeDisplay').textContent;
            const calcAge = document.getElementById('calculatedAgeDisplay').textContent;
            const currentUrl = window.location.href;

            const text = `🕵️‍♂️ [리부팅50] 전격 재테크 나이 판독 결과!\n\n나의 실제 나이: ${realAge}\n나의 금융 연령: ${calcAge}\n\n📊 진단명:\n${ageTitle}\n\n💡 한줄평:\n${comp}\n\n내 통장은 청춘일까, 고조할아버지일까? 즉시 판독해보기 👇\n🔗 ${currentUrl}\n\n🎥 뼈 때리는 직장인 재테크 맛집: 리부팅50`;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('금융 연령 판독 결과가 📋 클립보드에 복사되었습니다!');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('금융 연령 판독 결과가 📋 클립보드에 복사되었습니다!');
            }
        }

        // 2. 카카오톡 공유
        function shareKakao() {
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                try {
                    Kakao.init('6ebaddaec876611ecd045b336acfdc66');
                } catch (e) {
                    console.error("클릭 시점 재초기화 예외:", e);
                }
            }

            if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
                alert("카카오 스크립트 키 연동에 실패했습니다. 일반 '텍스트 복사'를 이용해주세요!");
                return;
            }

            const ageTitle = document.getElementById('financialAgeDisplay').textContent;
            const baseDomain = "https://rebooting50.github.io/toolbox/financial-age.html"; 
            const safeImg = "https://ssl.gstatic.com/onebox/financial/charts/common/trending_up_green_24dp.png";

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '🕵️‍♂️ 리부팅50 재테크 나이 판독 결과',
                    description: `${ageTitle}\n나의 진짜 금융 연령 점수를 확인해보세요.`,
                    imageUrl: safeImg,
                    link: {
                        mobileWebUrl: baseDomain,
                        webUrl: baseDomain,
                    },
                },
                buttons: [
                    {
                        title: '나도 나이 판독하기',
                        link: {
                            mobileWebUrl: baseDomain,
                            webUrl: baseDomain,
                        },
                    },
                ],
            });
        }

        // 3. 이미지 저장 방식 (html2canvas)
        function saveAsImage() {
            const captureArea = document.getElementById('captureArea');
            
            html2canvas(captureArea, {
                backgroundColor: "#ffffff",
                scale: 2, 
                logging: false,
                useCORS: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = image;
                link.download = '리부팅50_재테크_나이_판독_결과.png';
                link.click();
            }).catch(err => {
                console.error("이미지 저장 실패:", err);
                alert("이미지 변환 중 오류가 발생했습니다.");
            });
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateFinancialAge();
            });
        });
    </script>
</body>
</html>
